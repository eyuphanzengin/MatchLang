name: yeni_proje
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  
  # --- GÜNCELLENEN FIREBASE PAKETLERİ ---
  # speech_to_text ^7.0.0 ile uyumlu olması için bunları yükseltiyoruz
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  # --------------------------------------

  provider: ^6.1.1
  shared_preferences: ^2.1.1
  path_provider: ^2.0.11

  # Giriş Yöntemleri
  google_sign_in: ^6.2.1

  # Görsel & Tasarım
  flutter_screenutil: ^5.8.4
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  fl_chart: ^1.0.0

  # Ses ve Konuşma
  audioplayers: ^6.5.0
  flutter_tts: ^4.2.3
  
  # Android hatasını çözen sürüm
  speech_to_text: ^7.0.0
  
  # NLP
  string_similarity: ^2.1.1
  google_generative_ai: ^0.4.7
  cloud_functions: ^5.6.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/avatars/
    - assets/audio/
    - .env