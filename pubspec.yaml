name: yeni_proje
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- GÜNCELLENEN FIREBASE PAKETLERİ ---
  # Yeni Flutter sürümüyle tam uyumlu güncel paketler
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  cloud_functions: ^6.1.0
  # --------------------------------------

  provider: ^6.1.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.3

  # Giriş Yöntemleri
  google_sign_in: ^7.2.0

  # Görsel & Tasarım
  flutter_screenutil: ^5.9.3
  cupertino_icons: ^1.0.9
  google_fonts: ^8.0.2 # Hataları çözen en kritik güncelleme
  fl_chart: ^1.2.0

  # Ses ve Konuşma
  audioplayers: ^6.5.0
  flutter_tts: ^4.2.3
  speech_to_text: ^7.0.0

  # NLP ve Yapay Zeka
  string_similarity: ^2.1.1
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^6.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/avatars/
    - assets/audio/
    - .env
